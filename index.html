<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Giappone 50">
  <meta name="theme-color" content="#0D0D0D">
  <title>冒険の記録 · Giappone 50 Giorni</title>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #F4F0E6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    
    #root {
      min-height: 100vh;
    }
    
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E8E4DC;
      border-top-color: #C1121F;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 16px;
      font-size: 12px;
      font-weight: 700;
      color: #999;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">CARICAMENTO...</div>
    </div>
  </div>

  <!-- Firebase SDK v9 compat (più compatibile) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  
  <!-- Firebase Config -->
  <script>
    // Configurazione Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAyEoxTck8VPAJiQcrIgliprimKnmdyVss",
  authDomain: "japan-trip-2026-78025.firebaseapp.com",
  projectId: "japan-trip-2026-78025",
  storageBucket: "japan-trip-2026-78025.firebasestorage.app",
  messagingSenderId: "847807566082",
  appId: "1:847807566082:web:c71a44744b341b59f5b21b",
  measurementId: "G-K6E84PMEW6"
};
    
    // Inizializza Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // Abilita persistence offline
    db.enablePersistence({ synchronizeTabs: true })
      .catch((err) => {
        if (err.code === 'failed-precondition') {
          console.warn('Persistence: multiple tabs');
        } else if (err.code === 'unimplemented') {
          console.warn('Persistence: not available');
        }
      });
    
    // Esponi globalmente
    window.firebaseDB = db;
    window.firebaseReady = true;
    
    console.log('🔥 Firebase initialized');
  </script>

  <!-- React + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- App -->
  <script type="text/babel" src="./app.jsx?v=5"></script>
  
  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('✅ Service Worker registered'))
          .catch(err => console.log('❌ SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
